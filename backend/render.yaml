services:
  - type: web
    name: shopify-ai-chatbot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
      - key: SHOPIFY_SHOP
        sync: false
      - key: SHOPIFY_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: STORE_URL
        sync: false
